
services:

  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      - sqlserver

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=ProductManagementDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"

    ports:
      - "1433:1433"